name: Website Monitor Bot

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      test_send:
        description: 'Set to "true" to force send a test notification to Telegram'
        required: false
        default: 'false'

permissions:
  contents: write  # Crucial to allow committing and pushing state.json back to repo

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-level: '3.10'
        python-version: '3.10'
        cache: 'pip' # caching pip dependencies

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Scraper Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GOOGLE_SCRIPT_PROXY_URL: ${{ secrets.GOOGLE_SCRIPT_PROXY_URL }}
        TEST_SEND: ${{ github.event.inputs.test_send }}
      run: python scraper.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/state.json
        # Only commit and push if there are changes to state.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Update tracker state [skip ci]" && git push)
